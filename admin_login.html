<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - College Event Registration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-calendar-alt"></i> College Event Registration
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="event_list.html">View Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="admin_login.html">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-header bg-danger text-white">
                        <h2 class="mb-0 text-center">
                            <i class="fas fa-lock"></i> Admin Login
                        </h2>
                    </div>
                    <div class="card-body p-5">
                        <form id="adminLoginForm">
                            <div class="mb-4">
                                <label for="admin_username" class="form-label">
                                    <i class="fas fa-user"></i> Username
                                </label>
                                <input type="text" class="form-control form-control-lg" id="admin_username" name="username" required>
                                <div class="invalid-feedback" id="usernameFeedback"></div>
                            </div>

                            <div class="mb-4">
                                <label for="admin_password" class="form-label">
                                    <i class="fas fa-key"></i> Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control form-control-lg" id="admin_password" name="password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="invalid-feedback" id="passwordFeedback"></div>
                            </div>

                            <div id="alertMessage" class="alert alert-warning alert-dismissible fade show" role="alert" style="display: none;">
                                <span id="alertContent"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <button type="submit" class="btn btn-danger btn-lg w-100 mb-3">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>

                            <hr>
                            <p class="text-muted text-center mb-0">
                                <a href="index.html" class="link-primary">Back to Student Registration</a>
                            </p>
                        </form>

                        <div class="alert alert-info mt-4" role="alert">
                            <strong>Demo Credentials:</strong>
                            <ul class="mb-0">
                                <li><strong>Username:</strong> admin</li>
                                <li><strong>Password:</strong> admin123</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 College Event Registration System. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/admin_login.js"></script>
</body>
</html>
