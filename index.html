<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Registration - Student Form</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-calendar-alt"></i> College Event Registration
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="event_list.html">View Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin_login.html">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white">
                        <h2 class="mb-0">
                            <i class="fas fa-user-plus"></i> Student Registration Form
                        </h2>
                    </div>
                    <div class="card-body">
                        <form id="registrationForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                    <div class="invalid-feedback" id="nameFeedback"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="usn" class="form-label">USN (University Serial Number) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="usn" name="usn" placeholder="1RV19CS###" required>
                                    <div class="invalid-feedback" id="usnFeedback"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                    <div class="invalid-feedback" id="emailFeedback"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91 XXXXXXXXXX" required>
                                    <div class="invalid-feedback" id="phoneFeedback"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="department" class="form-label">Department <span class="text-danger">*</span></label>
                                    <select class="form-select" id="department" name="department" required>
                                        <option value="">-- Select Department --</option>
                                        <option value="CSE">Computer Science Engineering (CSE)</option>
                                        <option value="ECE">Electronics and Communication (ECE)</option>
                                        <option value="ME">Mechanical Engineering (ME)</option>
                                        <option value="CE">Civil Engineering (CE)</option>
                                        <option value="EEE">Electrical and Electronics (EEE)</option>
                                        <option value="IT">Information Technology (IT)</option>
                                    </select>
                                    <div class="invalid-feedback" id="departmentFeedback"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="year" class="form-label">Year <span class="text-danger">*</span></label>
                                    <select class="form-select" id="year" name="year" required>
                                        <option value="">-- Select Year --</option>
                                        <option value="1">1st Year</option>
                                        <option value="2">2nd Year</option>
                                        <option value="3">3rd Year</option>
                                        <option value="4">4th Year</option>
                                    </select>
                                    <div class="invalid-feedback" id="yearFeedback"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="events" class="form-label">Select Events to Register <span class="text-danger">*</span></label>
                                <div id="eventsList" class="event-selection">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading events...</span>
                                    </div>
                                </div>
                                <div class="invalid-feedback" id="eventsFeedback"></div>
                            </div>

                            <div id="alertMessage" class="alert alert-warning alert-dismissible fade show" role="alert" style="display: none;">
                                <span id="alertContent"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <div class="d-flex justify-content-between">
                                <button type="reset" class="btn btn-secondary">
                                    <i class="fas fa-redo"></i> Clear Form
                                </button>
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="fas fa-check"></i> Submit Registration
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 College Event Registration System. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/registration.js"></script>
</body>
</html>
